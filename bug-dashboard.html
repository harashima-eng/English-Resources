<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug Reports Dashboard</title>
<link rel="stylesheet" href="bug-dashboard.css">
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Bug Reports</h1>
    <p>Sign in with your teacher account</p>
    <button class="login-btn" id="loginBtn">Sign in with Google</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <h1>Bug Reports <span class="live-dot" title="Live updates"></span></h1>
      <span class="user-email" id="userEmail"></span>
    </div>
    <div class="header-actions">
      <button class="ai-analyze-btn" id="aiAnalyzeBtn" style="display:none">AI Analyze</button>
      <button class="ai-compare-btn" id="aiCompareBtn" style="display:none">Compare with Previous</button>
      <button id="themeToggle" class="theme-toggle" title="Toggle dark/light mode"></button>
      <button class="prune-btn" id="pruneBtn">Prune >30 days</button>
      <button class="prune-btn" id="purgeAnimBtn">Purge anim_conflict</button>
      <button id="logoutBtn">Sign out</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="triage-panel" id="triagePanel" style="display:none">
    <div class="triage-panel-header">
      <h3>AI Triage Analysis</h3>
      <button id="triageToggle" class="triage-toggle-btn">Hide</button>
    </div>
    <div id="triageBody">
      <div class="triage-status" id="triageStatus"></div>
      <div id="triageContent"></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Reports by Type</h3>
      <canvas id="doughnutChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>30-Day Trend</h3>
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <div class="browser-bar" id="browserBreakdown"></div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="bugs">Bug Reports <span class="tab-badge" id="bugCount">0</span></button>
    <button class="tab-btn" data-tab="errors">JS Errors <span class="tab-badge" id="errorCount">0</span></button>
    <button class="tab-btn" data-tab="sessions">Sessions <span class="tab-badge" id="sessionCount">0</span></button>
    <button class="tab-btn" data-tab="health">Detection Health</button>
  </div>

  <div class="tab-panel active" id="bugsPanel">
    <div class="filters">
      <select id="filterType"><option value="">All types</option></select>
      <select id="filterExam"><option value="">All lessons</option></select>
      <input type="text" id="searchInput" class="search-input" placeholder="Search type, exam, device, error...">
      <input type="date" id="filterFrom" title="From date">
      <input type="date" id="filterTo" title="To date">
    </div>

    <div class="bulk-bar" id="bulkBar">
      <span id="bulkCount">0 selected</span>
      <button id="bulkCopy">Copy selected</button>
      <button id="bulkDelete">Delete selected</button>
    </div>

    <table class="report-table">
      <thead>
        <tr>
          <th><input type="checkbox" id="selectAll" class="select-all-cb"></th>
          <th>Type</th>
          <th>Lesson</th>
          <th>Device</th>
          <th>Time</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="reportBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none"><p>No bug reports found.</p></div>
  </div>

  <div class="tab-panel" id="errorsPanel">
    <table class="report-table">
      <thead>
        <tr><th>Message</th><th>Count</th><th>Last Seen</th><th>Devices</th><th></th></tr>
      </thead>
      <tbody id="errorsBody"></tbody>
    </table>
    <div class="empty-state" id="errorsEmpty" style="display:none"><p>No JS errors found.</p></div>
  </div>

  <div class="tab-panel" id="healthPanel">
    <table class="report-table">
      <thead>
        <tr><th>Detector</th><th>Status</th><th>Last Fired</th><th>Total (30d)</th><th>Threshold</th></tr>
      </thead>
      <tbody id="healthBody"></tbody>
    </table>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="bug-dashboard.js"></script>
<script type="module" src="bug-dashboard-ai.js"></script>
</body>
</html>
